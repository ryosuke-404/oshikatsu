name: oshikatu
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.81+81

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core packages
  provider: ^6.1.2
  intl: ^0.20.0

  # UI packages
  google_fonts: ^6.2.1
  flutter_colorpicker: ^1.1.0
  image_picker: ^1.1.2
  table_calendar: ^3.1.2
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  flutter_rating_bar: ^4.0.1
  confetti: ^0.6.0
  
  # Local Database (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Utilities
  uuid: ^4.4.0
  http: ^1.2.1
  share_plus: ^9.0.0
  url_launcher: ^6.0.0
  
  # Feature specific packages
  video_player: ^2.8.6
  flutter_inappwebview: ^6.0.0
  youtube_player_flutter: ^9.0.4
  
  flutter_map: ^6.1.0 # flutter_mapを追加
  latlong2: ^0.9.1 # flutter_mapの依存関係
  path_provider: ^2.1.5
  path: ^1.9.1
  google_mobile_ads: ^6.0.0
  easy_localization: ^3.0.7
  upgrader: ^12.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation for Database
  hive_generator: ^2.0.1
  build_runner: ^2.4.10

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/translations/
    - assets/app_launch_animation.mp4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/oshi.png"